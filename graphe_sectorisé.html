<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
            padding: 0;
        }
        .main-header {
            width: 100%;
            background: #1a2340;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 56px;
            box-shadow: 0 2px 16px #1a234033, 0 1.5px 8px #0001;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 2000;
        }
        .main-header .logo {
            font-weight: 800;
            font-size: 1.22em;
            letter-spacing: 1.5px;
            padding: 0 0 0 2px;
            text-shadow: 0 1px 4px #0002;
        }
        .main-header .user-btns {
            display: flex;
            gap: 8px;
        }
        .main-header .user-btns button {
            background: #fff;
            color: #1a2340;
            border: none;
            border-radius: 22px;
            padding: 7px 24px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 1.5px 8px #1a234022;
            transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.18s;
        }
        .main-header .user-btns button:hover {
            background: #1a2340;
            color: #fff;
            box-shadow: 0 3px 16px #1a234044;
            transform: translateY(-2px) scale(1.04);
        }
        .modal-bg {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(37,99,235,0.10);
            z-index: 3000;
        }
        .modal-bg.active { display: block; }
        .user-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px #1a234022, 0 1.5px 8px #0001;
            padding: 32px 28px 18px 28px;
            min-width: 320px;
            max-width: 92vw;
            z-index: 4000;
            animation: modalIn 0.22s cubic-bezier(.4,1.4,.6,1) 1;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translate(-50%,-60%) scale(0.95); }
            to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
        }
        .user-modal.active { display: block; }
        .user-modal h3 {
            margin: 0 0 18px 0;
            font-size: 1.18em;
            color: #1a2340;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .user-modal label {
            display: block;
            margin-bottom: 10px;
            color: #2d3a4a;
            font-size: 1em;
        }
        .user-modal input, .user-modal select {
            width: 100%;
            padding: 8px 12px;
            margin-top: 2px;
            margin-bottom: 14px;
            border: 1px solid #bfc9d1;
            border-radius: 6px;
            font-size: 1em;
            background: #f6f8fa;
        }
        .user-modal button[type="submit"] {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 22px;
            padding: 7px 22px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 4px;
            font-weight: 500;
            box-shadow: 0 1px 4px #0001;
        }
        .user-modal button[type="submit"]:hover {
            background: #1741a6;
        }
        .user-modal .close-modal {
            position: absolute;
            top: 10px; right: 16px;
            background: none;
            border: none;
            font-size: 1.3em;
            color: #aaa;
            cursor: pointer;
        }
        .user-msg {
            min-height: 18px;
            font-size: 0.98em;
            margin-bottom: 2px;
        }
        .main-content {
            margin-top: 70px;
            padding: 0 24px 24px 24px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }
        button, input[type="button"], input[type="submit"] {
            border-radius: 22px !important;
            border: none;
            background: #1a2340;
            color: #fff;
            font-size: 1em;
            padding: 7px 22px;
            font-weight: 600;
            box-shadow: 0 1.5px 8px #1a234022;
            cursor: pointer;
            transition: background 0.18s, color 0.18s, box-shadow 0.18s, transform 0.18s;
        }
        button:hover, input[type="button"]:hover, input[type="submit"]:hover {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 3px 16px #2563eb33;
            transform: translateY(-2px) scale(1.04);
        }
        input, select {
            border-radius: 8px;
            border: 1.5px solid #d1d7e6;
            padding: 8px 12px;
            font-size: 1em;
            background: #f7fafd;
            margin-bottom: 8px;
            transition: border 0.18s;
        }
        input:focus, select:focus {
            border: 1.5px solid #2563eb;
            outline: none;
        }
        /* Popups modernisés */
        #popupSubdiv, #popupForm {
            border-radius: 18px !important;
            box-shadow: 0 8px 32px #1a234022, 0 1.5px 8px #0001;
            background: #fff !important;
            border: none !important;
            padding: 28px 24px 18px 24px !important;
            min-width: 320px;
            max-width: 92vw;
            animation: modalIn 0.22s cubic-bezier(.4,1.4,.6,1) 1;
        }
        #popupSubdiv button, #popupForm button {
            margin-top: 8px;
        }
        #dropImg {
            border-radius: 10px;
            border: 1.5px dashed #1a2340;
            background: #e3eefd;
            color: #1a2340;
            transition: background 0.18s, color 0.18s;
        }
        #dropImg:hover {
            background: #1a2340;
            color: #fff;
        }
        /* SVG background modernisé */
        #svg {
            background: #f9fafc !important;
            border-radius: 18px;
            box-shadow: 0 2px 12px #1a234022;
        }
        @media (max-width: 600px) {
            .main-header {
                flex-direction: column;
                height: auto;
                padding: 8px 2vw;
                align-items: stretch;
            }
            .main-header .user-btns {
                justify-content: center;
                width: 100%;
                margin-top: 8px;
            }
            .main-header .logo {
                text-align: center;
                width: 100%;
            }
            .main-content { padding: 0 2vw 24px 2vw; }
            .user-modal { min-width: 98vw; }
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="main-header">
        <span class="logo">Graphe Sectorisé</span>
        <div class="user-btns">
            <button id="showLoginBtn">Connexion</button>
            <button id="showRegisterBtn">Inscription</button>
            <button id="logoutBtn" style="display:none;">Déconnexion</button>
        </div>
    </div>
    <div class="modal-bg" id="modalBg"></div>
    <div class="user-modal" id="loginModal">
        <button class="close-modal" onclick="closeUserModal()">×</button>
        <form id="loginForm">
            <h3>Connexion</h3>
            <label>Login : <input type="text" id="loginLogin" required /></label>
            <label>Mot de passe : <input type="password" id="loginPassword" required /></label>
            <button type="submit">Se connecter</button>
            <div id="loginMsg" class="user-msg"></div>
        </form>
    </div>
    <div class="user-modal" id="registerModal">
        <button class="close-modal" onclick="closeUserModal()">×</button>
        <form id="registerForm">
            <h3>Inscription</h3>
            <label>Login : <input type="text" id="regLogin" required /></label>
            <label>Mot de passe : <input type="password" id="regPassword" required /></label>
            <label>Rôle :
                <select id="regRole" required>

    </div>
    <div class="main-content" id="mainContent">
    <!-- Pop-up pour demander le nombre de subdivisions -->
    <div id="popupSubdiv"
        style="display:none; position:fixed; top:40%; left:50%; transform:translate(-50%,-40%); background:#fff; border:1px solid #ccc; padding:20px; z-index:1001; box-shadow:0 2px 10px #0003;">
        <form id="subdivForm">
            <label>Combien d'enfants ?
                <input type="number" id="inputSubdiv" min="2" max="12" value="3" style="width:60px;" />

            <input type="hidden" id="subdivTargetId" />
            <button type="submit">OK</button>
            <button type="button" onclick="closeSubdivPopup()">Annuler</button>

    <div id="popupForm"
        style="display:none; position:fixed; top:30%; left:50%; transform:translate(-50%,-30%); background:#fff; border:1px solid #ccc; padding:20px; z-index:1000; box-shadow:0 2px 10px #0003;">
        <form id="editForm">

            <input type="hidden" id="targetId" />
            <div>
                <label>Nom : <input type="text" id="inputNom" /></label>
            </div>
            <div>
                <label>Prénom : <input type="text" id="inputPrenom" /></label>
            </div>
            <div>
                <label>Sexe :
                    <select id="inputSexe">
                        <option value="homme">Homme</option>
                        <option value="femme">Femme</option>
                    </select>
                </label>
            </div>
            <div>
                <label>Date naissance : <input type="date" id="inputNaissance" /></label>
            </div>
            <div>
                <label>Date décès : <input type="date" id="inputDeces" /></label>
            </div>
            <div>
                <label>Adopté : <input type="checkbox" id="inputAdopte" /></label>
            </div>
            <div>
                <label>Image :
                    <input type="text" id="inputImg" placeholder="chemin/vers/image.jpg" style="width:60%" />
                    <input type="file" id="fileImg" accept="image/*" style="display:inline-block; width:auto;" />
                </label>
                <div id="dropImg"
                    style="border:1px dashed #aaa; padding:4px; margin-top:4px; text-align:center; color:#888; cursor:pointer;">
                    Glissez-déposez une image ici</div>
            </div>
            <div style="margin-top:10px;">
                <button type="submit">Enregistrer</button>
                <button type="button" id="deleteBtn" style="margin-left:10px; color:red;">Supprimer</button>
                <button type="button" onclick="closePopup()" style="margin-left:10px;">Annuler</button>
            </div>

    </div>
    <!-- image svg avec un arriere plan -->
    <!-- Bouton pour réinitialiser le zoom -->
    <div style="margin-bottom:10px;">
        <button onclick="resetZoom()">Réinitialiser le zoom</button>
    </div>
    <svg id="svg" width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g id="svgContent">
            <!-- Formulaire pop-up caché au départ -->
            <!-- <rect id="bg" x="0" y="0" width="100%" height="100%" fill="lightblue"/> -->
            <!-- <circle id="c" cx="100" cy="100" r="5" fill="#f8f8f8" stroke="#ccc" stroke-width="2"/> -->
            <!-- <text x="100" y="100" font-size="18" text-anchor="middle" alignment-baseline="middle">Moi</text>     -->
        </g>
    </svg>


    <button id="addGenBtn" onclick="addGeneration()" style="display:none;">add gen</button>


    </div> <!-- .main-content -->

    <script>
    // Fonction pour recréer le graphe SVG à partir des données sauvegardées
    async function loadGraphFromBackend() {
        try {
            const res = await fetch('http://localhost:3001/api/graph/load');
            if (!res.ok) return;
            const data = await res.json();
            if (!data || !Array.isArray(data)) return;
            const svgContent = document.getElementById('svgContent');
            svgContent.innerHTML = '';
            data.forEach(el => {
                let node;
                if (el.tag === 'circle') {
                    node = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                } else if (el.tag === 'path') {
                    node = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                } else if (el.tag === 'image') {
                    node = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                } else if (el.tag === 'text') {
                    node = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                } else {
                    return;
                }
                // Appliquer les attributs
                for (const [k, v] of Object.entries(el.attrs || {})) {
                    node.setAttribute(k, v);
                }
                // Appliquer les datasets
                for (const [k, v] of Object.entries(el.dataset || {})) {
                    node.dataset[k] = v;
                }
                // Appliquer le texte si besoin
                if (el.text && node.tagName === 'text') {
                    node.textContent = el.text;
                }
                svgContent.appendChild(node);
            });
        } catch (e) {
            console.error('Erreur chargement graphe', e);
        }
    }

    // Charger le graphe au chargement de la page si connecté
    window.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('token')) {
            loadGraphFromBackend();
        }
    });
    // Masquer le contenu principal si non connecté
    function updateMainContentVisibility() {
        const token = localStorage.getItem('token');
        document.getElementById('mainContent').style.display = token ? '' : 'none';
    }
    // Appel au chargement de la page
    updateMainContentVisibility();
    // Mettre à jour après connexion/déconnexion
    window.addEventListener('storage', updateMainContentVisibility);
    document.getElementById('loginForm').addEventListener('submit', function() {
        setTimeout(updateMainContentVisibility, 500);
    });
    document.getElementById('registerForm').addEventListener('submit', function() {
        setTimeout(updateMainContentVisibility, 500);
    });
    document.getElementById('logoutBtn').addEventListener('click', function() {
        setTimeout(updateMainContentVisibility, 100);
    });
    // Affichage conditionnel des fonctionnalités selon connexion
    function updateUIAuth() {
        const token = localStorage.getItem('token');
        // Affiche le bouton add gen seulement si connecté
        document.getElementById('addGenBtn').style.display = token ? '' : 'none';
        // Affiche/désaffiche les boutons connexion/inscription/déconnexion
        document.getElementById('showLoginBtn').style.display = token ? 'none' : '';
        document.getElementById('showRegisterBtn').style.display = token ? 'none' : '';
        document.getElementById('logoutBtn').style.display = token ? '' : 'none';
    }
        // Déconnexion utilisateur
        document.getElementById('logoutBtn').onclick = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('role');
            updateUIAuth();
        };
    // Appel au chargement de la page
    updateUIAuth();
    // Mettre à jour l'UI après connexion/déconnexion
    window.addEventListener('storage', updateUIAuth);

    // Après connexion, mettre à jour l'UI
    document.getElementById('loginForm').addEventListener('submit', function() {
        setTimeout(updateUIAuth, 500);
    });
    // Après inscription, mettre à jour l'UI (au cas où l'inscription connecte)
    document.getElementById('registerForm').addEventListener('submit', function() {
        setTimeout(updateUIAuth, 500);
    });
    // Gestion modale utilisateur
    const loginModal = document.getElementById('loginModal');
    const registerModal = document.getElementById('registerModal');
    const modalBg = document.getElementById('modalBg');
    function closeUserModal() {
        loginModal.classList.remove('active');
        registerModal.classList.remove('active');
        modalBg.classList.remove('active');
    }
    document.getElementById('showLoginBtn').onclick = () => {
        loginModal.classList.add('active');
        registerModal.classList.remove('active');
        modalBg.classList.add('active');
    };
    document.getElementById('showRegisterBtn').onclick = () => {
        registerModal.classList.add('active');
        loginModal.classList.remove('active');
        modalBg.classList.add('active');
    };
    modalBg.onclick = closeUserModal;

    // Inscription utilisateur
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const login = document.getElementById('regLogin').value;
        const password = document.getElementById('regPassword').value;
        const role = document.getElementById('regRole').value;
        const res = await fetch('http://localhost:3001/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password, role })
        });
        const msg = document.getElementById('registerMsg');
        if (res.ok) {
            const data = await res.json();
            if (data.pendingAdmin) {
                msg.textContent = 'Demande admin envoyée. En attente d\'approbation.';
            } else {
                msg.textContent = 'Compte créé !';
            }
            document.getElementById('registerForm').reset();
        } else {
            const data = await res.json();
            msg.textContent = data.error || 'Erreur lors de la création.';
            msg.style.color = 'red';
        }
        setTimeout(() => { msg.textContent = ''; msg.style.color = ''; }, 3000);
    });
    // Connexion utilisateur
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const login = document.getElementById('loginLogin').value;
        const password = document.getElementById('loginPassword').value;
        const res = await fetch('http://localhost:3001/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password })
        });
        const msg = document.getElementById('loginMsg');
        if (res.ok) {
            const data = await res.json();
            msg.textContent = 'Connecté ! Rôle : ' + data.role;
            document.getElementById('loginForm').reset();
            // Stocker le token et le rôle dans le localStorage
            localStorage.setItem('token', data.token);
            localStorage.setItem('role', data.role);
        } else {
            const data = await res.json();
            if (data.error && data.error.includes('en attente')) {
                msg.textContent = data.error;
            } else {
                msg.textContent = data.error || 'Erreur de connexion.';
            }
            msg.style.color = 'red';
        }
        setTimeout(() => { msg.textContent = ''; msg.style.color = ''; }, 3000);
        // Fonction pour qu'un admin approuve une demande admin
        async function approveAdmin(login) {
            const token = localStorage.getItem('token');
            if (!token) return alert('Non connecté');
            const res = await fetch('http://localhost:3001/api/auth/approve-admin', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ login })
            });
            if (res.ok) {
                alert('Utilisateur approuvé comme admin !');
            } else {
                const data = await res.json();
                alert(data.error || 'Erreur approbation.');
            }
        }

        // Exemple d'appel : approveAdmin('login_a_approuver');

        // Sauvegarde régulière de l'état du graphe (toutes les 30s)
        setInterval(() => {
            // Exemple de récupération de l'état du graphe (à adapter selon votre structure)
            const svgContent = document.getElementById('svgContent');
            const elements = Array.from(svgContent.children).map(el => {
                return {
                    tag: el.tagName,
                    attrs: Object.fromEntries(Array.from(el.attributes).map(a => [a.name, a.value])),
                    dataset: { ...el.dataset },
                    text: el.textContent
                };
            });
            fetch('http://localhost:3001/api/graph/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: elements })
            });
        }, 30000);
    });
    </script>
    <script>
        // Gestion du bouton fichier et drag&drop pour l'image
        document.getElementById('fileImg').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (evt) {
                    document.getElementById('inputImg').value = evt.target.result;
                    document.getElementById('dropImg').textContent = file.name;
                };
                reader.readAsDataURL(file);
            }
        });
        // Drag & drop
        const dropZone = document.getElementById('dropImg');
        dropZone.addEventListener('dragover', function (e) {
            e.preventDefault();
            dropZone.style.background = '#e0e0e0';
        });
        dropZone.addEventListener('dragleave', function (e) {
            e.preventDefault();
            dropZone.style.background = '';
        });
        dropZone.addEventListener('drop', function (e) {
            e.preventDefault();
            dropZone.style.background = '';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function (evt) {
                    document.getElementById('inputImg').value = evt.target.result;
                    dropZone.textContent = file.name;
                };
                reader.readAsDataURL(file);
            }
        });

        // Ajout du déplacement (pan) à la souris sur le contenu SVG
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let pan = { x: 0, y: 0 };
        const svg = document.getElementById('svg');
        const svgContent = document.getElementById('svgContent');

        svg.addEventListener('mousedown', function (e) {
            // Autoriser bouton gauche (0) ou molette (bouton du milieu, 1)
            if (e.button !== 0 && e.button !== 1) return;
            isDragging = true;
            dragStart.x = e.clientX;
            dragStart.y = e.clientY;
            svg.style.cursor = 'grabbing';
            // Empêcher le scroll par défaut si molette
            if (e.button === 1) e.preventDefault();
        });

        window.addEventListener('mousemove', function (e) {
            if (!isDragging) return;
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            svgContent.setAttribute('transform', `scale(${zoomFactor}) translate(${pan.x + dx / zoomFactor},${pan.y + dy / zoomFactor})`);
        });

        window.addEventListener('mouseup', function (e) {
            if (!isDragging) return;
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            pan.x += dx / zoomFactor;
            pan.y += dy / zoomFactor;
            svgContent.setAttribute('transform', `scale(${zoomFactor}) translate(${pan.x},${pan.y})`);
            isDragging = false;
            svg.style.cursor = 'default';
        });

        // Gestion du zoom SVG (sur le contenu, pas la zone)
        let zoomFactor = 1;
        function applyZoom() {
            svgContent.setAttribute('transform', `scale(${zoomFactor}) translate(${pan.x},${pan.y})`);
        }
        // Zoom avec la molette de la souris
        svg.addEventListener('wheel', function (e) {
            e.preventDefault();
            const delta = e.deltaY;
            if (delta < 0) {
                zoomFactor *= 1.1;
            } else {
                zoomFactor /= 1.1;
            }
            applyZoom();
        });

        // Réinitialiser le zoom et le déplacement
        function resetZoom() {
            zoomFactor = 1;
            pan.x = 0;
            pan.y = 0;
            applyZoom();
        }
        // Initialiser le zoom au chargement
        window.addEventListener('DOMContentLoaded', applyZoom);

        // Pop-up pour demander le nombre de subdivisions
        let subdivCallback = null;
        function openSubdivPopup(target, defaultVal, callback) {
            document.getElementById('popupSubdiv').style.display = 'block';
            document.getElementById('inputSubdiv').value = defaultVal || 3;
            document.getElementById('subdivTargetId').value = target.dataset.id;
            subdivCallback = callback;
        }
        function closeSubdivPopup() {
            document.getElementById('popupSubdiv').style.display = 'none';
            subdivCallback = null;
        }
        document.getElementById('subdivForm').onsubmit = function (e) {
            e.preventDefault();
            const nb = parseInt(document.getElementById('inputSubdiv').value);
            const id = document.getElementById('subdivTargetId').value;
            if (!isNaN(nb) && nb > 1 && subdivCallback) {
                const el = document.querySelector('[data-id="' + id + '"]');
                subdivCallback(el, nb);
            }
            closeSubdivPopup();
        };

        ///////////////////////////////////////////////////////////////////////

        // Fonction pour ouvrir le formulaire pop-up et pré-remplir les champs
        function openPopup(target) {
            document.getElementById('popupForm').style.display = 'block';
            document.getElementById('targetId').value = target.dataset.id;
            document.getElementById('inputNom').value = target.dataset.nom || '';
            document.getElementById('inputPrenom').value = target.dataset.prenom || '';
            document.getElementById('inputSexe').value = target.dataset.sexe || 'homme';
            document.getElementById('inputImg').value = target.dataset.img || '';
            // Stocker la cible pour suppression
            document.getElementById('deleteBtn').onclick = function () {
                target.parentNode.removeChild(target);
                closePopup();
            };
        }

        // Fonction pour fermer le formulaire pop-up
        function closePopup() {
            document.getElementById('popupForm').style.display = 'none';
        }

        // Gérer la soumission du formulaire
        document.getElementById('editForm').onsubmit = function (e) {
            const naissance = document.getElementById('inputNaissance').value;
            const deces = document.getElementById('inputDeces').value;
            const adopte = document.getElementById('inputAdopte').checked;
            e.preventDefault();
            const id = document.getElementById('targetId').value;
            const nom = document.getElementById('inputNom').value;
            const prenom = document.getElementById('inputPrenom').value;
            const sexe = document.getElementById('inputSexe').value;
            const img = document.getElementById('inputImg').value;
            // Chercher l'élément SVG avec le bon id
            const el = document.querySelector('[data-id="' + id + '"]');
            if (el) {
                el.dataset.nom = nom;
                el.dataset.prenom = prenom;
                el.dataset.sexe = sexe;
                el.dataset.img = img;
                el.dataset.naissance = naissance;
                el.dataset.deces = deces;
                el.dataset.adopte = adopte;
                // Changer la couleur selon le sexe
                if (sexe === 'homme') {
                    el.setAttribute('fill', '#2196f3'); // bleu
                } else {
                    el.setAttribute('fill', '#e91e63'); // rose
                }
                // Changer la couleur du contour selon biologie/adopté
                if (adopte) {
                    el.setAttribute('stroke', '#FF0000'); // rouge pour adopté
                } else {
                    el.setAttribute('stroke', '#4CAF50'); // vert pour biologique
                }
                // Supprimer l'ancien texte associé à cet id
                const oldText = document.querySelector('[data-idt="' + el.dataset.id + '"]');
                if (oldText) oldText.remove();
                // Supprimer l'ancienne image associée à cet id
                const oldImg = document.querySelector('[data-imgid="' + el.dataset.id + '"]');
                if (oldImg) oldImg.remove();
                // Recréer le texte avec nom/prénom
                let label = (nom && nom.trim() !== '' ? nom : '') + (prenom && prenom.trim() !== '' ? ' ' + prenom : '');
                label = label.trim() !== '' ? label.trim() : el.dataset.id;
                // Ajout de la date naissance-décès sous le nom/prénom
                let dateLabel = '';
                if (naissance) {
                    dateLabel = naissance.substring(0, 4) + '-';
                    if (deces) {
                        dateLabel += deces.substring(0, 4);
                    }
                }
                // Calculer la position du texte et de l'image
                let x = 100, y = 100, r = 80, angleA = 0, angleD = 0;
                let imgX = 100, imgY = 100;
                if (el.tagName === 'circle') {
                    x = Number(el.getAttribute('cx'));
                    y = Number(el.getAttribute('cy')) + Number(el.getAttribute('r')) - 10;
                    r = Number(el.getAttribute('r'));
                    imgX = Number(el.getAttribute('cx'));
                    imgY = Number(el.getAttribute('cy'));
                } else if (el.tagName === 'path') {
                    r = Number(el.dataset.r || 80);
                    angleA = Number(el.dataset.aa || 0);
                    angleD = Number(el.dataset.ad || 0);
                    // Centre géométrique du secteur (milieu du secteur, rayon moyen)
                    const angleM = (angleA + angleD) / 2;
                    const r0 = 20 * (Number(el.dataset.gen) - 1); // rayon intérieur du secteur
                    const r1 = r; // rayon extérieur
                    const rayonMoyen = (r0 + r1) / 2;
                    // Correction : placer l'image au centre du secteur (rayon moyen, angle moyen)
                    imgX = 100 + rayonMoyen * Math.cos(angleM);
                    imgY = 100 - rayonMoyen * Math.sin(angleM);
                    x = 100 + (r - 10) * Math.cos(angleM);
                    y = 100 - (r - 10) * Math.sin(angleM);
                }
                // Afficher l'image si renseignée, puis le texte juste en dessous
                let textYOffset = 0;
                if (img && img.trim() !== '') {
                    textYOffset = 18; // Décaler le texte sous l'image (rayon image + marge)
                }
                addText(svgContent, label, x, y + textYOffset);
                // Afficher la date naissance-décès sous le nom/prénom si renseigné, avec une police plus petite et plus proche
                if (dateLabel) {
                    addText(svgContent, dateLabel, x, y + textYOffset + 11, 40, 12);
                }
                // Ajouter l'image si renseignée, centrée sur la même position que le texte (x, y)
                if (img && img.trim() !== '') {
                    // Créer un clipPath unique pour chaque image
                    const clipId = 'clip-img-' + el.dataset.id;
                    let defs = svg.querySelector('defs');
                    if (!defs) {
                        defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                        svg.insertBefore(defs, svg.firstChild);
                    }
                    // Supprimer l'ancien clipPath s'il existe
                    const oldClip = svg.querySelector('#' + clipId);
                    if (oldClip) oldClip.remove();
                    // Rayon du cercle de découpe (ajustable)
                    const rClip = 15;
                    const clipPath = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
                    clipPath.setAttribute('id', clipId);
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', x);
                    circle.setAttribute('cy', y);
                    circle.setAttribute('r', rClip);
                    clipPath.appendChild(circle);
                    defs.appendChild(clipPath);

                    // Créer l'image centrée sur (x, y)
                    const image = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                    image.setAttribute('href', img);
                    image.setAttribute('width', rClip * 2);
                    image.setAttribute('height', rClip * 2);
                    image.setAttribute('x', x - rClip);
                    image.setAttribute('y', y - rClip);
                    image.setAttribute('clip-path', 'url(#' + clipId + ')');
                    image.setAttribute('data-imgid', el.dataset.id);
                    svgContent.appendChild(image);
                }

                //////////////////////////////////////////////////////////////////
                //////////////////////////////////////////////////////////////////
                // Envoi des données à l'API backend MongoDB avec authentification
                const token = localStorage.getItem('token');
                fetch('http://localhost:3001/api/person', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token ? 'Bearer ' + token : ''
                    },
                    body: JSON.stringify({
                        id: el.dataset.id,
                        nom,
                        prenom,
                        naissance,
                        deces,
                        sexe,
                        img,
                        adopte
                    })
                }).then(r => r.json()).then(data => {
                    // Optionnel : afficher un message ou faire autre chose
                    // console.log('Sauvegardé dans MongoDB', data);
                }).catch(err => {
                    console.error('Erreur sauvegarde MongoDB', err);
                });
            }
            closePopup();
        };

        function getmaxid() {
            const elts_id = document.querySelectorAll('[data-id]');
            let id_max = 0;
            elts_id.forEach(el => {
                const val = Number(el.dataset.id);
                if (val > id_max) {
                    id_max = val;
                }
            });
            return id_max;

        // gen_max ancetre_id_max_in_prev_gen id_max : fonctions de recherche de valeurs max pour gérer l'ajout de nouveaux cercles/secteurs        // gen_max : recherche de la generation max actuelle pour calculer le rayon du nouveau disque
        // ancetre_id_max_in_prev_gen : recherche dans la generation  max actuelle le membre avec le plus grand id pour lui affilier la prochaine génération
        // id_max : recherche le membre avec le plus grand id pour déterminer l'id du prochain disque / secteur
        function getmaxs() {
            // Cette fonction recherche les valeurs maximales pour :
            // - la génération (data-gen)
            // - l'id dans la génération précédente (data-id)
            // - l'id max global (data-id)
            // Elle retourne un objet avec ces trois valeurs pour gérer l'ajout de nouveaux cercles/secteurs.

            // génération max
            const elts_gen = document.querySelectorAll('[data-gen]');
            let gen_max = 0;
            elts_gen.forEach(el => {
                const val = Number(el.dataset.gen);
                if (val > gen_max) {
                    gen_max = val;
                }
            });

            // id max dans la génération précédente
            const elts_id_in_prev_gen = document.querySelectorAll('[data-gen="' + gen_max + '"]');
            let ancetre_id_max_in_prev_gen = 0;
            elts_id_in_prev_gen.forEach(el => {
                const val = Number(el.dataset.id);
                if (val > ancetre_id_max_in_prev_gen) {
                    ancetre_id_max_in_prev_gen = val;
                }
            });

            // id max
            let id_max = getmaxid();

            return { gen_max, ancetre_id_max_in_prev_gen, id_max };
        }

        // Ajouter un disque de taille suppérieure aux diques existants selon
        // la régle d'or (on attribue le nouvele enfant au cadet de la génération précédente = id max de la 
        // génération précédente
        function addGeneration() {
            // Récupérer les valeurs caractérisques de la derniere génération
            // notament la gen max et l'id max dans la gen max et l'id max global 
            let { gen_max, ancetre_id_max_in_prev_gen, id_max } = getmaxs();
            console.log("gen_max, ancetre_id_max_in_prev_gen, id_max", gen_max, ancetre_id_max_in_prev_gen, id_max);
            // Récupérer les secteurs dans la précédente génération 
            const elts_in_prev_gen = document.querySelectorAll('[data-gen="' + gen_max + '"]');

            const gen_max_updated = gen_max + 1;
            let newRadius = gen_max_updated * 20;
            const svgContent = document.getElementById('svgContent');

            // Si la dernière génération est un cercle alors on ajoute un cercle
            if (elts_in_prev_gen.length < 2) {

                newCircle.setAttribute('r', newRadius);
                newCircle.setAttribute('fill', 'grey');
                newCircle.setAttribute('stroke', '#ccc');
                newCircle.setAttribute('stroke-width', '2');

                // attributs personnalisés
                newCircle.dataset.gen = gen_max_updated;
                newCircle.dataset.ancetre_id = ancetre_id_max_in_prev_gen;
                newCircle.dataset.id = id_max + 1;

                // fonction de call back
                newCircle.addEventListener('click', (e) => {
                    // clic droit : edition du secteur
                    if (e.button === 2) {
                        e.preventDefault();
                        openPopup(e.target);
                    } else { // clic gauche : modification du nombre d'enfants 
                        openSubdivPopup(e.target, 3, addChild);
                    }

                newCircle.oncontextmenu = function (e) { e.preventDefault(); openPopup(e.target); };

                // Insérer le nouveau cercle au début de l'image (en arriere plan)
                svgContent.insertBefore(newCircle, svgContent.firstChild);

                // Ajouter un texte pour afficher le nom complet (nom + prénom) du cercle (ou l'id si pas de nom)
                let nomCercle = (newCircle.dataset.nom && newCircle.dataset.nom.trim() !== '' ? newCircle.dataset.nom : '') +
                    (newCircle.dataset.prenom && newCircle.dataset.prenom.trim() !== '' ? ' ' + newCircle.dataset.prenom : '');
                nomCercle = nomCercle.trim() !== '' ? nomCercle.trim() : (id_max + 1);
                addText(svgContent,
                    nomCercle,
                    100,
                    100 + newRadius - 10);
            } else {
                // sinon on prolonge les secteurs de la dernière génération

                // Créer les nouveaux secteurs
                for (let i = 0; i < elts_in_prev_gen.length; i++) {

                    const sector = document.createElementNS('http://www.w3.org/2000/svg', 'path');

                    // Attributs générationnels
                    sector.dataset.gen = gen_max_updated;
                    sector.dataset.ancetre_id = Number(elts_in_prev_gen[i].dataset.id);
                    sector.dataset.id = id_max + (i + 1);

                    // Attributs graphiques
                    const angleD = Number(elts_in_prev_gen[i].dataset.ad);
                    const angleA = Number(elts_in_prev_gen[i].dataset.aa);
                    sector.dataset.r = newRadius;
                    sector.dataset.cx = elts_in_prev_gen[i].dataset.cx;
                    sector.dataset.cy = elts_in_prev_gen[i].dataset.cy;
                    sector.dataset.ad = angleD;
                    sector.dataset.aa = angleA;

                    console.log('add sector', sector.dataset);
                    sector.setAttribute('d', `M 100 100 
                        L ${100 + newRadius * Math.cos(angleD)} ${100 - newRadius * Math.sin(angleD)} 
                        A 
                        ${newRadius} ${newRadius} 
                        0 0 0
                        ${100 + newRadius * Math.cos(angleA)}
                        ${100 - newRadius * Math.sin(angleA)} Z`);
                    sector.setAttribute('fill', `rgba(0, 0, ${i * 255 / elts_in_prev_gen.length}, 1)`);
                    sector.setAttribute('fill', `rgba(${i * 255 / elts_in_prev_gen.length}, 0, 0, 1)`);

                    // fonction de call back
                    sector.addEventListener('click', (e) => {
                        // clic droit : edition du secteur
                        if (e.button === 2) {
                            e.preventDefault();
                            openPopup(e.target);
                        } else { // clic gauche : modification du nombre d'enfants 
                            openSubdivPopup(e.target, elts_in_prev_gen.length, addChild);
                        }
                    });
                    sector.oncontextmenu = function (e) { e.preventDefault(); openPopup(e.target); };

                    // Insérer le nouveau secteur au début de l'image (en arriere plan)
                    svgContent.insertBefore(sector, svgContent.firstChild);


                    // Ajouter un texte pour afficher l'id du secteur
                    const newText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    // attributs graphiques
                    newText.setAttribute('font-size', '18');

                    newText.setAttribute('text-anchor', 'middle');

                    newText.setAttribute('x', 100 + (newRadius - 10) * Math.cos((angleA + angleD) / 2));
                    newText.setAttribute('y', 100 - (newRadius - 10) * Math.sin((angleA + angleD) / 2));
                    // Ajouter un texte pour afficher le nom complet (nom + prénom) du secteur (ou l'id si pas de nom)
                    let nomSecteur = (sector.dataset.nom && sector.dataset.nom.trim() !== '' ? sector.dataset.nom : '') +
                        (sector.dataset.prenom && sector.dataset.prenom.trim() !== '' ? ' ' + sector.dataset.prenom : '');
                    nomSecteur = nomSecteur.trim() !== '' ? nomSecteur.trim() : (id_max + (i + 1));
                    newText.textContent = nomSecteur;
                    // attributs personnalisés
                    newText.dataset.idt = id_max + (i + 1);
                    // Ajouter le texte au svg
                    svgContent.appendChild(newText);
                }

            }

        }

        function addText(svg, t, x, y, maxWidth = 60, minFontSize = 8) {
            const newText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            newText.setAttribute('font-family', 'Arial');
            newText.setAttribute('text-anchor', 'middle');
            newText.setAttribute('dominant-baseline', 'middle');
            newText.setAttribute('fill', 'white');
            newText.setAttribute('x', x);
            newText.setAttribute('y', y);
            newText.textContent = t;
            newText.dataset.idt = t;

            // Ajustement dynamique de la taille de police
            // Si minFontSize est fourni, on commence à 18 sinon à 18
            let fontSize = (minFontSize && minFontSize > 0) ? minFontSize : 18;
            if (minFontSize === 8) fontSize = 18; // fallback pour compatibilité
            if (arguments.length < 5) minFontSize = 8;
            if (arguments.length < 4) maxWidth = 60;
            // Si minFontSize > 8, on commence à minFontSize et on réduit si besoin
            if (minFontSize > 8) fontSize = minFontSize;
            else fontSize = 18;
            newText.setAttribute('font-size', fontSize);
            svg.appendChild(newText);

            // Détermination automatique de la largeur max selon la position (rayon)
            let dx = x - 100;
            let dy = y - 100;
            let rayon = Math.sqrt(dx * dx + dy * dy);
            let autoMaxWidth = Math.max(40, rayon * 1.6);
            let bbox = newText.getBBox();
            while (bbox.width > autoMaxWidth && fontSize > minFontSize) {
                fontSize -= 1;
                newText.setAttribute('font-size', fontSize);
                bbox = newText.getBBox();
            }
        }

        // A rx ry x-axis-rotation large-arc-flag sweep-flag x y
        // rx : Rayon horizontal de l’ellipse (rayon X)
        // ry : Rayon vertical de l’ellipse (rayon Y)
        // x-axis-rotation : Rotation de l’ellipse (en degrés, généralement 0 pour un cercle)
        // large-arc-flag : 0 ou 1 (1 = arc > 180°, 0 = arc ≤ 180°)
        // sweep-flag : 0 ou 1 (1 = sens horaire, 0 = sens antihoraire)
        // x : Coordonnée X du point d’arrivée de l’arc
        // y : Coordonnée Y du point d’arrivée de l’arc

        // et répercussion sur les générations suivantes
        // nbEnfants doit être suppérieur au nombre d'enfant existant
        function addChild(parent, nbEnfants = 3) {

            // si la génération des enfants n'existe pas encore, alors on la crée

            /*****************************************************************************************************************************/

            // Récupérer l'image svgContent
            // ----------------------------------------
            const svgContent = document.getElementById('svgContent');

            // Récupérer les caractéristiques du parent
            // ----------------------------------------
            // les données graphiques (le rayon, le centre, angle de départ et angle d'arrivée))
            let radius, centerX, centerY;
            if (parent.tagName === 'path') { // secteur
                radius = Number(parent.dataset.r);

            const childs = Array.from(document.querySelectorAll('[data-ancetre_id="' + parent.dataset.id + '"]'));

            nbEnfantsExistants = childs.length;
            radius += 20; // augmenter le rayon pour les enfants

            if (childs[0].tagName === 'circle') {
                const oldChild = childs[0];
                const newSector = document.createElementNS('http://www.w3.org/2000/svg', 'path');

                // Attributs générationnels (conservés)
                newSector.dataset.gen = oldChild.dataset.gen;
                newSector.dataset.ancetre_id = oldChild.dataset.ancetre_id;
                newSector.dataset.id = oldChild.dataset.id;

                // fonction de call back
                newSector.addEventListener('click', (e) => {

                    }
                });
                newSector.oncontextmenu = function (e) { e.preventDefault(); openPopup(e.target); };
                console.log('sub new child', newSector);

                // remplacer le cercle par le secteur au même plan
                svgContent.insertBefore(newSector, oldChild);
                svgContent.removeChild(oldChild);

                // l'étiquette du cercle sera supprimée ou déplacée comme toutes étiquettes 
                // dans la boucle de mise à jour des données graphiques et générationnelles

                childs[0] = newSector; // mettre à jour la référence dans la liste des enfants

            }


            // ajout des nouveaux enfants
            // sans mise en forme graphique 
            // (on fera ça près pour tous les enfants : les nouveaux et les existants)
            // mais avec les fonctions de call back car sur les enfants déjà existants
            // * on ne peut pas les écraser 
            // * ou les effacer 
            let nextSibling = childs[0];
            for (let i = nbEnfantsExistants; i < nbEnfants; i++) {
                const sector = document.createElementNS('http://www.w3.org/2000/svg', 'path'); // créaton d'un secteur pour chaque nouvel enfant

                        openSubdivPopup(e.target, nbEnfants, addChild);
                    }
                });
                sector.oncontextmenu = function (e) { e.preventDefault(); openPopup(e.target); };

                console.log('add new child', sector);

                childs.push(sector); //  ajouter le nouvel enfant à la liste
                svgContent.insertBefore(sector, nextSibling); // ajoute au graphique
                nextSibling = sector; // mémoriser le prochain pour l'insertion (même plan)
            }

            // mettre à jour les enfants 
            // ----------------------------------------
            nextSibling = childs[0];
            let iid = id_max + 1;
            for (let i = 0; i < nbEnfants; i++) {

                // Attributs
                const sa = (aa - ad) / nbEnfants; // angle de chaque secteur
                const angleD = ad + i * sa;
                const angleA = ad + (i + 1) * sa;
                childs[i].dataset.gen = Number(parent.dataset.gen) + 1;
                childs[i].dataset.ancetre_id = Number(parent.dataset.id);
                // TRES TRES IMPORTANT : ne pas écraser l'id des enfants existants 
                // sinon on perd la référence pour les générations suivantes 
                if (childs[i].dataset.id == undefined) {
                    childs[i].dataset.id = iid;
                    iid++;
                } else {
                    // plutôt que de déplacer l'étiquette du secteur, on va la supprimer et la recréer comme pour tous les autres secteurs
                    const oldText = document.querySelector('[data-idt="' + childs[i].dataset.id + '"]');
                    console.log('childs[i].dataset.id', childs[i].dataset.id);
                    console.log('remove old text', oldText);
                    console.log('remove // old text parentNode', oldText.parentNode);
                    console.log('remove // svgContent', svgContent);
                    svgContent.removeChild(oldText);

                }
                childs[i].dataset.r = radius;
                childs[i].dataset.cx = centerX;
                childs[i].dataset.cy = centerY;
                childs[i].dataset.ad = angleD;
                childs[i].dataset.aa = angleA;

                childs[i].setAttribute('d', `M 100 100 
                    L ${100 + radius * Math.cos(angleD)} ${100 - radius * Math.sin(angleD)} 
                    A 
                    ${radius} ${radius} 
                    0 0 0
                    ${100 + radius * Math.cos(angleA)}
                    ${100 - radius * Math.sin(angleA)} Z`);

                childs[i].setAttribute('fill', `rgba(0, 0, ${i * 255 / nbEnfants}, 1)`);
                childs[i].setAttribute('stroke', "#FFFFFF");

                console.log('update childs[i]', childs[i].dataset);
                console.log('update childs[i]', childs[i]);

                // Insérer le nouveau secteur avant celui qui suivait le secteur 
                // ou le cercle que l'on a remplacé (au même plan)
                svgContent.insertBefore(childs[i], nextSibling);
                nextSibling = childs[i];

                // Ajouter un texte pour afficher l'id du secteur
                let nomChild = (childs[i].dataset.nom && childs[i].dataset.nom.trim() !== '' ? childs[i].dataset.nom : '') +
                    (childs[i].dataset.prenom && childs[i].dataset.prenom.trim() !== '' ? ' ' + childs[i].dataset.prenom : '');
                nomChild = nomChild.trim() !== '' ? nomChild.trim() : childs[i].dataset.id;
                addText(svgContent,
                    nomChild,
                    100 + (radius - 10) * Math.cos((angleA + angleD) / 2),
                    100 - (radius - 10) * Math.sin((angleA + angleD) / 2));

            }
        }

        // pour résumer :
        // pb 1 : ajouter des générations (porblème lorsque la derniere génération contient des secteurs) REGLE
        // pb 2 : ajouter des enfants à un parent situé sur la derniere ou l'avant dernière génération REGLE
        // pb 3 : ajouter des enfants à un parent sur toutes les génération A FAIRE (il faudrait rappliquer le code de pb 2 sur les descendants)
        // Remarque : que ce soit un cercle ou un secteur, le code de pb 2 est le même !!
        // pb 4 : la suppression d'un enfant A FAIRE (ce n'est pas juste supprimer un secteur c'est redessiner les secteurs restants)
        // Remarque : pb3 et pb 4 c'est assez similaire : dès que vous l'avez fait pour un secteur il faut le répéter pour les descendants
        // Conclusion : on arrete avec le graphe en l'état ca fonctionne, il faut juste écire les nom des personnes à la place des indices
        //  et il faut juste interdire l'ajout d'enfants sur les secteurs qui ne sont pas dans la dernière génération et l'avant dernière génération
        // il sera impossible de supprimer pour le moment (sauf si vous voulez essayer ! sur la derniere génération déjà par exemple
        // n'oubliez pas que ce n'est pas que supprime mais redessiner les secteurs restants)
